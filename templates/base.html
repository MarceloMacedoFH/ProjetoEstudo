{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Center Noivas{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body class="flex h-screen overflow-hidden dark:bg-stone-900 dark:text-stone-100">

    <aside class="w-64 bg-sidebar flex flex-col border-r border-stone-200/60 shadow-sm">
        
        <div class="p-6 bg-white border-b border-stone-100 flex flex-col items-center justify-center">
            <img src="{% static 'images/logo-noiva.png' %}" alt="Sedna Group Logo" class="max-h-28 w-auto object-contain p-1">
        </div>

        <nav class="flex-1 p-4 space-y-1 overflow-y-auto text-sm text-stone-600 font-medium">
            <a href="#" class="flex items-center justify-between px-4 py-2.5 rounded-lg transition-colors hover-link">
                <span>Cadastro</span>
            </a>
            <a href="#" class="flex items-center justify-between px-4 py-2.5 rounded-lg transition-colors hover-link">
                <span>Recentes</span>
            </a>
        </nav>

        <div class="p-4 bg-stone-100/50 text-center text-[11px] text-stone-400 border-t border-stone-200/50">
            &copy; 2026 Center Noivas
        </div>
    </aside>

    <main class="flex-1 flex flex-col overflow-y-auto">
        
        <header class="bg-white dark:bg-stone-900 border-b border-stone-200/60 dark:border-stone-800 px-8 py-4 flex items-center justify-between">
            <h2 class="brand-font text-xl text-stone-700 dark:text-stone-300 font-light italic">Bem-vindo ao Sistema</h2>
            <div class="flex items-center space-y-0 space-x-4 text-xs text-stone-500">
                <span>Olá, Administrador</span>
                <div class="w-2 h-2 rounded-full bg-emerald-400"></div>
            </div>
        </header>

        <div class="p-8 max-w-7xl w-full mx-auto">
            {% block content %}
            <div class="bg-white dark:bg-stone-850 rounded-xl p-8 shadow-sm border border-stone-100 dark:border-stone-800">
                <h1 class="brand-font text-3xl text-stone-800 dark:text-stone-100 mb-2">Bem-vindo ao Sistema</h1>
                <p class="text-stone-500 dark:text-stone-400 text-sm">Selecione uma opção no menu lateral ou gerencie suas categorias.</p>
            </div>
            {% endblock %}
        </div>
    </main>

</body>
</html>

{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Center Noivas{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class' }
        
        // Bloqueia o "flash" de luz branca antes do carregamento
        if (localStorage.getItem('theme') === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body class="flex h-screen overflow-hidden">

    <aside class="w-64 bg-sidebar flex flex-col border-r border-stone-200/40 sidebar-transition">
        
        <div class="p-10 bg-transparent border-b border-stone-200/20 flex flex-col items-center justify-center">
            <a href="{% url 'lista_estoque' %}"><img src="{% static 'images/logo-noiva.png' %}" alt="Logo Center Noivas" class="w-24 h-24 object-cover rounded-full border-2 border-stone-100 shadow-sm grayscale-[0.2] hover:grayscale-0 transition-all duration-500"></a>
        </div>

        <nav class="flex-1 p-6 space-y-4 overflow-y-auto text-sm text-stone-700 dark:text-stone-300 font-semibold">
    
            <div>
                <button id="btn-cadastro" class="w-full flex items-center justify-between px-4 py-3.5 rounded-2xl transition-all hover-link focus:outline-none group">
                    <span class="flex items-center">
                        <svg class="w-5 h-5 mr-4 text-stone-500 group-hover:text-stone-700 transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 16h.01"></path></svg>
                        Cadastro
                    </span>
                    <svg id="seta-cadastro" class="w-4 h-4 transform transition-transform duration-250 text-stone-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M19 9l-7 7-7-7"></path>
                    </svg>
                </button>

                <div id="submenu-cadastro" class="hidden pl-12 mt-2 space-y-1 border-l border-stone-300 ml-6">
                    <a href="{% url 'lista_categorias'%}" class="flex items-center px-4 py-2 rounded-xl transition-all hover-link text-[12px] tracking-wider font-bold">
                        <span>Categorias</span>
                    </a>
                    <a href="#" class="flex items-center px-4 py-2 rounded-lg transition-colors hover-link text-xs">
                        <span>Clientes</span>
                    </a>
                    <a href="#" class="flex items-center px-4 py-2 rounded-lg transition-colors hover-link text-xs">
                        <span>Produtos</span>
                    </a>
                </div>
            </div>
        
            <a href="#" class="flex items-center justify-between px-4 py-3.5 rounded-2xl transition-all hover-link group">
                <span class="flex items-center">
                    <svg class="w-5 h-5 mr-4 text-stone-500 group-hover:text-stone-700 transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                    Recentes
                </span>
            </a>
        </nav>

        <div class="sidebar-footer">
            &copy; 2026 Center Noivas
        </div>
    </aside>

    <main class="flex-1 flex flex-col overflow-y-auto">
        
        <header class="glass-effect px-10 py-7 flex items-center justify-between sticky top-0 z-10">
            <h2 class="brand-font text-2xl text-stone-800 dark:text-stone-100 font-light italic">Painel Atelier</h2>
            <div class="flex items-center space-x-8 text-[12px] uppercase tracking-widest text-stone-600 dark:text-stone-400 font-bold">
                <button id="theme-toggle" class="p-2 rounded-full hover:bg-stone-100 dark:hover:bg-stone-800 transition-colors focus:outline-none text-stone-500">
                    <svg id="theme-toggle-dark-icon" class="hidden w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path d="M17.293 13.293A8 8 0 016.707 2.707a8.001 8.001 0 1010.586 10.586z"></path></svg>
                    <svg id="theme-toggle-light-icon" class="hidden w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path d="M10 2a1 1 0 011 1v1a1 1 0 11-2 0V3a1 1 0 011-1zm4 8a4 4 0 11-8 0 4 4 0 018 0zm-.464 4.95l.707.707a1 1 0 001.414-1.414l-.707-.707a1 1 0 00-1.414 1.414zm2.12-10.607a1 1 0 010 1.414l-.706.707a1 1 0 11-1.414-1.414l.707-.707a1 1 0 011.414 0zM17 11a1 1 0 100-2h-1a1 1 0 100 2h1zm-7 4a1 1 0 011 1v1a1 1 0 11-2 0v-1a1 1 0 011-1zM5.05 6.464A1 1 0 106.465 5.05l-.708-.707a1 1 0 00-1.414 1.414l.707.707zm1.414 8.486l-.707.707a1 1 0 01-1.414-1.414l.707-.707a1 1 0 011.414 1.414zM4 11a1 1 0 100-2H3a1 1 0 000 2h1z"></path></svg>
                </button>
                
                <span class="hidden sm:inline">Olá, Administrador</span>
                <div class="w-2 h-2 rounded-full bg-emerald-400/80 shadow-[0_0_12px_rgba(52,211,153,0.4)]"></div>
            </div>
        </header>

        <div class="p-10 max-w-7xl w-full mx-auto">
            {% block content %}
            <div class="premium-card p-16">
                <h1 class="brand-font text-3xl text-stone-800 dark:text-stone-100 mb-2">Bem-vindo ao Sistema</h1>
                <p class="text-stone-500 dark:text-stone-400 text-base font-light tracking-wide">Selecione uma opção no menu lateral para começar a gestão do seu acervo.</p>
            </div>
            {% endblock %}
        </div>
    </main>

<script>
    document.getElementById('btn-cadastro').addEventListener('click', function() {
        const submenu = document.getElementById('submenu-cadastro');
        const seta = document.getElementById('seta-cadastro');
        
        // Alterna a visibilidade do submenu
        submenu.classList.toggle('hidden');
        
        // Gira a seta em 180 graus quando aberto
        seta.classList.toggle('rotate-180');
    });
    const themeToggleBtn = document.getElementById('theme-toggle');
    const darkIcon = document.getElementById('theme-toggle-dark-icon');
    const lightIcon = document.getElementById('theme-toggle-light-icon');

    // Ajusta o ícone inicial
    if (document.documentElement.classList.contains('dark')) {
        lightIcon.classList.remove('hidden');
    } else {
        darkIcon.classList.remove('hidden');
    }

    themeToggleBtn.addEventListener('click', function() {
        // Alterna classe no HTML
        document.documentElement.classList.toggle('dark');
        
        // Alterna ícones
        darkIcon.classList.toggle('hidden');
        lightIcon.classList.toggle('hidden');

        // Salva preferência
        if (document.documentElement.classList.contains('dark')) {
            localStorage.setItem('theme', 'dark');
        } else {
            localStorage.setItem('theme', 'light');
        }
    });
</script>
</body>
</html>

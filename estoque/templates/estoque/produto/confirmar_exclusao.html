{% extends 'base.html' %}

{% block title %}Excluir Produto - Center Noivas{% endblock %}

{% block content %}
<div class="premium-card p-12 max-w-xl mx-auto text-center">
    <div class="mb-10">
        <div class="w-20 h-20 bg-red-50 text-red-500 rounded-full flex items-center justify-center mx-auto mb-6">
            <svg class="w-10 h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>
        </div>
        <h1 class="brand-font text-3xl text-stone-800 mb-4">Confirmar Exclusão</h1>
        <p class="text-stone-600">Tem certeza que deseja excluir o produto <strong>"{{ produto.descricao }}"</strong>?<br>Esta ação não pode ser desfeita.</p>
    </div>

    <form method="post" class="flex flex-col gap-4">
        {% csrf_token %}
        <button type="submit" class="px-10 py-4 bg-red-500 text-white rounded-full text-xs uppercase tracking-widest font-semibold hover:bg-red-600 transition-all shadow-lg shadow-red-500/20">
            Sim, excluir permanentemente
        </button>
        <a href="{% url 'lista_produto' %}" class="text-[11px] uppercase tracking-widest text-stone-400 hover:text-stone-600 font-bold transition-colors py-2">
            Cancelar e voltar
        </a>
    </form>
</div>
{% endblock %}

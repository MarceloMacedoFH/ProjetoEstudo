{% extends 'base.html' %}

{% block title %}Editar Produto - Center Noivas{% endblock %}

{% block content %}
<div class="premium-card p-10 max-w-4xl mx-auto">
    <div class="mb-10 text-center">
        <h1 class="brand-font text-4xl text-stone-800 mb-2">Editar Produto</h1>
        <p class="text-stone-500 italic">Atualizando: {{ produto.descricao }} ({{ produto.codigo }})</p>
    </div>

    <form method="post" class="space-y-6">
        {% csrf_token %}
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            {% for field in form %}
            <div class="{% if field.name == 'observacao' or field.name == 'descricao' %}md:col-span-2{% endif %}">
                <label class="block text-xs uppercase tracking-widest text-stone-500 font-bold mb-2 ml-1">{{ field.label }}</label>
                {{ field }}
            </div>
            {% endfor %}
        </div>
        <div class="flex justify-center mt-10">
            <button type="submit" class="px-12 py-4 bg-[#B4977A] text-white rounded-full text-xs uppercase tracking-widest font-semibold hover:bg-[#8C7356] transition-all shadow-lg shadow-[#B4977A]/20">
                Salvar Alterações
            </button>
        </div>
    </form>
</div>
{% endblock %}
